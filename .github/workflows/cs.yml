name: Run sms.py

on:
  workflow_dispatch:
  push:

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout代码
        uses: actions/checkout@v4

      - name: 🐍 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安装依赖
        run: pip install requests

      - name: ▶️ 运行脚本
        run: python sms.py